name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate engine parity golden values (from vendored reference engine)
        working-directory: backend
        run: TZ=UTC node tests/parity/gen_golden.mjs > tests/parity/golden.json

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        run: TZ=UTC python -m pytest -q
